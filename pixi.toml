[workspace]
name = "drforest"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]
preview = ["pixi-build"]

[package]
name = "drforest"
[package.build.backend]
name = "pixi-build-python"
version = "*"
[package.host-dependencies]
python = ">=3.11"
maturin = "*"
uv = "*"

[dependencies]

[pypi-dependencies]
drforest = { path = ".", editable = true }

[tasks]
setup = "pre-commit install"

[feature.test.dependencies]
pytest = "*"
pytest-cov = "*"
mypy = "*"
[feature.test.tasks]
test = "pytest"
test-coverage = "pytest --cov=drforest --cov-report=xml --cov-report=term-missing"

[feature.build.dependencies]
python = "*"
python-build = "*"
twine = ">=6"
maturin = "*"
[feature.build.tasks]
build-wheel = "python -m build --no-isolation ."
check-wheel = "twine check dist/*"
build-rust = "maturin develop --release"

[feature.dev.dependencies]
ipykernel = "*"
pip = "*"
loguru = ">=0.7.3,<0.8"

[feature.bench.dependencies]
scikit-learn = ">=1.4.4"
openml = ">=0.12.2,<0.13"

[feature.lint.dependencies]
pre-commit = "*"
ruff = "*"
prettier = "*"
taplo = "*"
pre-commit-hooks = "*"
typos = "*"
zizmor = "*"
ty = ">=0.0.44,<0.0.45"
[feature.lint.tasks]
lint = "pre-commit run --all-files"

[feature.py311.dependencies]
python = "3.11.*"
[feature.py312.dependencies]
python = "3.12.*"
[feature.py313.dependencies]
python = "3.13.*"
[feature.py314.dependencies]
python = "3.14.*"

[environments]
default = ["test", "build", "lint", "dev", "bench"]
py311 = ["py311", "test"]
py312 = ["py312", "test"]
py313 = ["py313", "test"]
py314 = ["py314", "test"]
