name: Build
on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      - name: Build project
        run: pixi run build-wheel
      - name: Check package
        run: pixi run check-wheel
      - name: Upload source distribution
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distribution-sdist
          path: dist/*.tar.gz

  wheels:
    name: Wheel (${{ matrix.platform.name }}, Python ${{ matrix.python-version }})
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.platform.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        platform:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_17"
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"
          - name: macos-x86_64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: "off"
          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Select build interpreter
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            echo "MATURIN_INTERPRETER=python${{ matrix.python-version }}" >> "$GITHUB_ENV"
          else
            echo "MATURIN_INTERPRETER=python" >> "$GITHUB_ENV"
          fi
      - name: Build wheel
        uses: PyO3/maturin-action@3e2bdf6ba6453a61e649744019b8a2d906c7eb38 # v1.51.0
        with:
          maturin-version: v1.14.1
          target: ${{ matrix.platform.target }}
          manylinux: ${{ matrix.platform.manylinux }}
          args: >-
            --release --locked --compatibility pypi --out dist
            --interpreter ${{ env.MATURIN_INTERPRETER }}
      - name: Test wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          cd "$RUNNER_TEMP"
          python -c "import numpy as np; from drforest import DistributionalRandomForest; X = np.arange(40.0).reshape(20, 2); y = X[:, 0]; model = DistributionalRandomForest(criterion='cart', n_estimators=2, subsample=1.0, min_samples_leaf=2, random_state=0).fit(X, y); assert model.predict(X[:3]).shape == (3,); assert model.predict_quantiles(X[:3], [0.5]).shape == (3, 1)"
      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: distribution-wheel-${{ matrix.platform.name }}-${{ matrix.python-version }}
          path: dist/*.whl

  release:
    name: Publish package
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, wheels]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: distribution-*
          path: dist
          merge-multiple: true
      - name: Publish package on PyPi
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
